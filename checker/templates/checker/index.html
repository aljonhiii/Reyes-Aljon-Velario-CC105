<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PhoneCheck — Addiction Predictor{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Design tokens ─────────────────────────────────────── */
    :root {
      --bg:        #080c14;
      --surface:   #0e1421;
      --card:      #131926;
      --border:    #1e2a3a;
      --accent:    #00d4c8;
      --accent2:   #ff6b4a;
      --accent3:   #a78bfa;
      --text:      #e4eaf5;
      --muted:     #6b7a99;
      --success:   #22d370;
      --danger:    #ff4a6b;
      --warn:      #ffb23f;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 15px;
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise texture overlay ─────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* ── Grid lines background ─────────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Navigation ─────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: 64px;
      background: rgba(8, 12, 20, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--font-head);
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.03em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-logo .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.7); }
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0; right: 0;
      height: 1px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--accent);
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      transform: scaleX(1);
    }

    /* ── Page wrapper ───────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      padding-top: 64px;
      min-height: 100vh;
    }

    /* ── Utility classes ────────────────────────────────────── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .badge-cyan   { background: rgba(0,212,200,0.12); color: var(--accent);  border: 1px solid rgba(0,212,200,0.3); }
    .badge-red    { background: rgba(255,74,107,0.12); color: var(--danger); border: 1px solid rgba(255,74,107,0.3); }
    .badge-green  { background: rgba(34,211,112,0.12); color: var(--success); border: 1px solid rgba(34,211,112,0.3); }
    .badge-orange { background: rgba(255,178,63,0.12); color: var(--warn);   border: 1px solid rgba(255,178,63,0.3); }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
    }

    .tag {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
    }

    /* ── Footer ─────────────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.06em;
    }

    footer span { color: var(--accent); }

    /* ── Animations ─────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-up {
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    .fade-up:nth-child(1) { animation-delay: 0.05s; }
    .fade-up:nth-child(2) { animation-delay: 0.15s; }
    .fade-up:nth-child(3) { animation-delay: 0.25s; }
    .fade-up:nth-child(4) { animation-delay: 0.35s; }
    .fade-up:nth-child(5) { animation-delay: 0.45s; }
  </style>

  {% block extra_css %}{% endblock %}
</head>
<body>

  <nav>
    <a href="{% url 'checker:home' %}" class="nav-logo">
      <span class="dot"></span>
      PhoneCheck
    </a>
    <ul class="nav-links">
      <li><a href="{% url 'checker:home' %}"    class="{% block nav_home %}{% endblock %}">Home</a></li>
      <li><a href="{% url 'checker:predict' %}" class="{% block nav_predict %}{% endblock %}">Predict</a></li>
      <li><a href="{% url 'checker:about' %}"   class="{% block nav_about %}{% endblock %}">Methodology</a></li>
    </ul>
  </nav>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <footer>
    Built by <span>Aljon Velario Reyes</span> · Random Forest Classifier ·
    Trained on 7,500 user records
  </footer>

</body>
</html>
